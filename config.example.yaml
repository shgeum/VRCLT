# vrclt configuration example
# Developer reference config. The standalone exe stores user settings in AppData.
# In a source checkout, copy this file to config.yaml if you want local overrides.
# Leave api_key empty to use the GEMINI_API_KEY environment variable instead.
api_key: ""
model: gemini-3.5-live-translate-preview

app:
  mode: vrchat                 # vrchat | discord; override with: python -m vrclt run --app vrchat
  profiles:
    vrchat:
      process: VRChat.exe      # process captured for inbound subtitles
      ui_mode: auto            # auto | vr | desktop
      voice_output: true       # translated voice + passthrough to CABLE Input
      passthrough_while_translating: false
      chatbox: true            # send outbound translated text to VRChat chatbox via OSC
      osc_control: true        # listen for VRChat avatar OSC controls
      vr_overlay: true         # SteamVR subtitle overlay
      wrist_ui: true           # SteamVR wrist menu
    discord:
      process: Discord.exe     # use DiscordCanary.exe or DiscordPTB.exe if needed
      ui_mode: desktop         # Discord mode keeps SteamVR overlays off
      voice_output: true
      passthrough_while_translating: false
      chatbox: false           # Discord has no VRChat OSC chatbox
      osc_control: false
      vr_overlay: false
      wrist_ui: false

dashboard:
  translation_on: true         # last Dashboard translation toggle state
  subtitles_on: true           # last Dashboard subtitles toggle state

outbound:                 # my voice -> others (VRChat hears the translation)
  enabled: true
  target_language: ja     # BCP-47: ja, en, ko, zh-Hans, ...
  echo_target_language: false
  mic_device: ""          # substring of device name; "" = default input
  tts_device: CABLE Input # VB-Cable playback side (VRChat mic = CABLE Output)
  monitor_device: ""      # also hear the translation myself ("" = off)
  text_only: false        # true = original mic passthrough + translated OSC text only
  voice_output: true      # false = no translated TTS output
  passthrough_while_translating: false  # true = raw mic always -> tts_device
  chatbox: true

inbound:                  # others' voices -> me (subtitles)
  enabled: true
  target_language: ko
  languages: [ko, en, ja] # wrist menu cycles subtitle language through these
  process: VRChat.exe
  play_audio: false       # also speak the translation into my headphones
  audio_device: ""
  vad_enabled: true       # Silero VAD: send only speech to Gemini
  vad_threshold: 0.5      # 0-1; raise toward 0.7 to reject more music
  vad_hangover_sec: 0.6   # keep capturing this long after speech stops

overlay:                  # inbound subtitle overlay (SteamVR, HMD-locked)
  enabled: true
  width_m: 0.9
  distance_m: 1.2
  below_m: 0.35
  tilt_deg: -15.0
  transform: null             # auto-managed after repositioning in VR
  font: bundled:NotoSansCJKkr-Regular.otf
  font_size: 44
  display_sec: 7.0        # how long finalized lines stay visible
  lines: 3                # recent finalized lines kept on screen
  show_source: false      # also show the original text

osc:
  ip: 127.0.0.1
  port: 9000
  throttle_sec: 1.5
  notification_sfx: false
  show_source: true       # chatbox: source on top, translation below
  chunk_display_sec: 4.0  # per-part display time when long text is split

audio:
  send_interval_ms: 100       # how often mic audio is flushed to the API
  finalize_silence_sec: 2.0   # flush a segment after transcription silence
  mic_idle_disconnect_sec: 15.0
  voice_rms_threshold: 90.0   # raise if noise opens sessions, lower if speech is missed
  voice_hangover_sec: 2.5     # keep the turn open this long through pauses
  echo_guard_multiplier: 4.0  # gate boost while game audio plays; 1.0 = off

control:                      # in-VR control via avatar parameters (OSC radial menu)
  enabled: true
  osc_listen_port: 9001
  param_enabled: VRCLT_Enabled
  param_lang: VRCLT_Lang
  languages: [ja, en, ko, zh-Hans, zh-Hant, yue, es, ru, fr, de]
  feedback_chatbox: true

ui:
  mode: auto                  # auto | vr | desktop
  lang: ""                    # ""=auto | en | ko | ja | zh
  close_action: tray          # tray | exit; window close button behavior

wrist_ui:                     # SteamVR wrist watch menu
  enabled: true
  hand: left
  width_m: 0.16
  offset: [-0.0557, -0.0265, 0.0952]
  tilt_deg: 197.994
  roll_deg: -18.911
  transform:                  # auto-managed after repositioning in VR
    - [0.2492944230417404, 0.08540377681623953, -0.9646577521711427, -0.055683394775783907]
    - [-0.767839036478661, -0.5895811632634125, -0.25062930837523045, -0.026494291823405507]
    - [-0.590149570434288, 0.8031779822175874, -0.08140481802947214, 0.09520546515391112]
  pointer_tilt_deg: 50.0
  font: bundled:NotoSansCJKkr-Bold.otf

log_level: INFO
