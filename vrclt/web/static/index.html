<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>vrclt</title>
<style>
  :root{--bg:#0e1014;--card:#171a21;--card2:#1f232c;--fg:#eceef2;--dim:#9aa0ad;
        --on:#2ea043;--off:#a86a1e;--sub:#2870aa;--accent:#4a6eb4;--line:#2a2e38;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.5 "Malgun Gothic",system-ui,sans-serif}
  .wrap{max-width:820px;margin:0 auto;padding:20px}
  h1{font-size:18px;margin:0 0 2px;display:flex;align-items:center;gap:8px}
  h1 .spacer{flex:1}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--dim)}
  .dot.on{background:var(--on)}
  .muted{color:var(--dim);font-size:12px;margin-bottom:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px}
  .card h2{font-size:13px;color:var(--dim);margin:0 0 12px;text-transform:uppercase;letter-spacing:.5px}
  .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
  .row:last-child{margin-bottom:0}
  .row>label{flex:0 0 130px;color:var(--dim)}
  button{border:0;border-radius:8px;padding:9px 16px;font:inherit;font-weight:700;color:#fff;cursor:pointer}
  button.toggle.on{background:var(--on)} button.toggle.off{background:var(--off)}
  button.toggle.subon{background:var(--sub)} button.toggle.suboff{background:var(--card2)}
  button.sm{padding:5px 10px;font-weight:400;background:var(--card2)}
  select,input{background:var(--card2);color:var(--fg);border:1px solid var(--line);
        border-radius:8px;padding:8px 10px;font:inherit;min-width:130px}
  #uiLang{min-width:0;padding:5px 8px;font-size:12px}
  input[type=number]{width:100px;min-width:0}
  input[type=checkbox]{min-width:0;width:18px;height:18px}
  #subs{background:#0a0c10;border-radius:10px;padding:14px;min-height:110px;max-height:280px;overflow:auto}
  .line{margin:0 0 10px} .line .o{color:var(--dim);font-size:13px} .line .t{font-size:17px}
  .partial{opacity:.6}
  details summary{cursor:pointer;color:var(--dim);font-size:13px;text-transform:uppercase;letter-spacing:.5px;padding:4px 0}
  .grp{margin:14px 0 4px;color:var(--accent);font-size:12px;font-weight:700}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 18px}
  .fld{display:flex;flex-direction:column;gap:4px}
  .fld span{color:var(--dim);font-size:12px}
  .fld select{min-width:0;width:100%}
  .chips{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .chip{background:var(--card2);border:1px solid var(--line);border-radius:16px;padding:4px 8px 4px 12px;display:flex;align-items:center;gap:6px}
  .chip b{font-weight:400} .chip x{cursor:pointer;color:var(--dim);font-weight:700}
  .chip x:hover{color:#e55}
  .save{margin-top:14px} .note{color:var(--accent);font-size:12px;margin-left:10px}
</style>
</head>
<body>
<div class="wrap">
  <h1><span class="dot" id="dot"></span> vrclt <span id="conn" class="muted" style="margin:0"></span>
      <span class="spacer"></span>
      <select id="uiLang" onchange="setUiLang(this.value)" title="UI language"></select></h1>
  <div class="muted" data-i18n="app_subtitle"></div>

  <div class="card">
    <h2 data-i18n="card_control"></h2>
    <div class="row"><label data-i18n="ctl_my_translate"></label>
      <button id="bTrans" class="toggle" onclick="toggle('translation_on')"></button>
      <select id="outLang" onchange="setLang('target_language',this.value)"></select></div>
    <div class="row"><label data-i18n="ctl_their_sub"></label>
      <button id="bSub" class="toggle" onclick="toggle('subtitles_on')"></button>
      <select id="subLang" onchange="setLang('inbound_language',this.value)"></select></div>
  </div>

  <div class="card"><h2 data-i18n="card_subs"></h2><div id="subs"></div></div>

  <div class="card">
    <details>
      <summary data-i18n="settings_summary"></summary>

      <div class="grp" data-i18n="grp_out_langs"></div>
      <div class="chips" id="outChips"></div>
      <div class="row" style="margin-top:8px">
        <input id="outAdd" data-i18n-ph="ph_out_add" style="flex:1">
        <button class="sm" data-i18n="btn_add" onclick="addLang('out')"></button></div>

      <div class="grp" data-i18n="grp_sub_langs"></div>
      <div class="chips" id="subChips"></div>
      <div class="row" style="margin-top:8px">
        <input id="subAdd" data-i18n-ph="ph_sub_add" style="flex:1">
        <button class="sm" data-i18n="btn_add" onclick="addLang('sub')"></button></div>

      <div class="grp" data-i18n="grp_api"></div><div class="grid" id="gApi"></div>
      <div class="grp" data-i18n="grp_app"></div><div class="grid" id="gApp"></div>
      <div class="grp" data-i18n="grp_dev"></div><div class="grid" id="gDev"></div>
      <div class="grp" data-i18n="grp_audio"></div><div class="grid" id="gAudio"></div>
      <div class="grp" data-i18n="grp_inbound"></div><div class="grid" id="gInbound"></div>
      <div class="grp" data-i18n="grp_overlay"></div><div class="grid" id="gOverlay"></div>
      <div class="grp" data-i18n="grp_desktop"></div><div class="grid" id="gDesktop"></div>

      <div class="row save"><button data-i18n="btn_save" onclick="saveCfg()"></button>
        <span class="note" id="cfgNote"></span></div>
    </details>
  </div>
</div>

<script>
let META={out_languages:[],sub_languages:[]}, CFG=null, DEV={inputs:[],outputs:[]};
let I18N={langs:["en"],labels:{en:"English"},strings:{},lang:"en"}, UILANG="en", LAST_STATE=null;
// translation-target language native names (separate from the UI display language)
const LANG={ja:"日本語",en:"English",ko:"한국어","zh-Hans":"中文(简)","zh-Hant":"中文(繁)",
            yue:"廣東話",es:"Español",ru:"Русский",fr:"Français",de:"Deutsch"};
const lname=c=>LANG[c]?`${LANG[c]} (${c})`:c;
const t=k=>{const e=I18N.strings[k];return e?(e[UILANG]||e.en||k):k;};
const api=async(p,o)=>(await fetch(p,o)).json();
const getP=(o,p)=>p.split('.').reduce((a,k)=>a&&a[k],o);
const setP=(o,p,v)=>{const k=p.split('.');let c=o;for(let i=0;i<k.length-1;i++)c=c[k[i]];c[k[k.length-1]]=v;};

// ---- i18n ----
function fillUiLangSelect(){
  const e=document.getElementById('uiLang');e.innerHTML='';
  I18N.langs.forEach(c=>{const o=document.createElement('option');o.value=c;
    o.textContent=I18N.labels[c]||c;e.appendChild(o);});
  e.value=UILANG;
}
function applyI18n(){
  document.documentElement.lang=UILANG;
  document.getElementById('uiLang').value=UILANG;
  document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n));
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>el.placeholder=t(el.dataset.i18nPh));
  if(CFG){buildFields();renderChips();}
  if(LAST_STATE)applyState(LAST_STATE);
}
function setUiLang(v){
  UILANG=v;applyI18n();
  api('/api/state',{method:'POST',headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({ui_lang:v})});
}

// ---- runtime controls ----
function fillLangs(){
  for(const [id,list] of [['outLang',META.out_languages],['subLang',META.sub_languages]]){
    const e=document.getElementById(id);e.innerHTML='';
    list.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=lname(c);e.appendChild(o);});
  }
}
function applyState(st){
  LAST_STATE=st;
  document.getElementById('dot').className='dot'+(st.connected?' on':'');
  document.getElementById('conn').textContent=st.connected?t('conn_on'):t('conn_off');
  const bt=document.getElementById('bTrans');
  bt.textContent=st.translation_on?t('btn_trans_on'):t('btn_trans_off');
  bt.className='toggle '+(st.translation_on?'on':'off');bt.dataset.v=st.translation_on?'1':'';
  const bs=document.getElementById('bSub');
  bs.textContent=st.subtitles_on?t('btn_sub_on'):t('btn_sub_off');
  bs.className='toggle '+(st.subtitles_on?'subon':'suboff');bs.dataset.v=st.subtitles_on?'1':'';
  if(document.activeElement.id!=='outLang')document.getElementById('outLang').value=st.target_language;
  if(document.activeElement.id!=='subLang')document.getElementById('subLang').value=st.inbound_language;
  // UI language changed elsewhere (VR / PC) -> follow it
  if(st.ui_lang && st.ui_lang!==UILANG && document.activeElement.id!=='uiLang'){
    UILANG=st.ui_lang;applyI18n();
  }
}
function applySubs(subs,partial){
  const box=document.getElementById('subs');box.innerHTML='';
  subs.forEach(s=>box.appendChild(lineEl(s.src,s.dst,false)));
  if(partial.dst||partial.src)box.appendChild(lineEl(partial.src,partial.dst,true));
  box.scrollTop=box.scrollHeight;
}
function lineEl(src,dst,p){
  const d=document.createElement('div');d.className='line'+(p?' partial':'');
  if(src){const o=document.createElement('div');o.className='o';o.textContent=src;d.appendChild(o);}
  const t2=document.createElement('div');t2.className='t';t2.textContent=dst||src;d.appendChild(t2);return d;}
async function toggle(f){
  const cur=document.getElementById(f==='translation_on'?'bTrans':'bSub').dataset.v==='1';
  await api('/api/state',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({[f]:!cur})});}
async function setLang(f,v){
  await api('/api/state',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({[f]:v})});}

// ---- language list editor ----
function renderChips(){
  for(const [boxId,path] of [['outChips','control.languages'],['subChips','inbound.languages']]){
    const box=document.getElementById(boxId);box.innerHTML='';
    (getP(CFG,path)||[]).forEach((code,i)=>{
      const c=document.createElement('div');c.className='chip';
      const b=document.createElement('b');b.textContent=lname(code);
      const x=document.createElement('x');x.textContent='✕';x.onclick=()=>{getP(CFG,path).splice(i,1);renderChips();};
      c.appendChild(b);c.appendChild(x);box.appendChild(c);
    });
  }
}
function addLang(which){
  const inp=document.getElementById(which==='out'?'outAdd':'subAdd');
  const code=inp.value.trim();if(!code)return;
  const path=which==='out'?'control.languages':'inbound.languages';
  const arr=getP(CFG,path);if(!arr.includes(code))arr.push(code);
  inp.value='';renderChips();
}

// ---- settings fields ----  [path, type]; label = t('f.'+path)
const GROUPS={
  gApi:[["api_key","pass"],["model","text"],
        ["outbound.target_language","text"],["inbound.target_language","text"]],
  gApp:[["app.mode","appmode"],["app.profiles.discord.process","text"]],
  gDev:[["outbound.mic_device","din"],["outbound.tts_device","dout"],
        ["outbound.monitor_device","dout"],["inbound.audio_device","dout"]],
  gAudio:[["audio.voice_rms_threshold","num"],["audio.voice_hangover_sec","num"],
          ["audio.echo_guard_multiplier","num"],["audio.send_interval_ms","num"],
          ["audio.finalize_silence_sec","num"],["outbound.echo_target_language","bool"]],
  gInbound:[["inbound.vad_enabled","bool"],["inbound.vad_threshold","num"],
            ["inbound.vad_hangover_sec","num"],["inbound.play_audio","bool"],
            ["osc.show_source","bool"]],
  gOverlay:[["overlay.font_size","num"],["overlay.distance_m","num"],
            ["overlay.below_m","num"],["overlay.tilt_deg","num"],
            ["overlay.lines","num"],["overlay.show_source","bool"]],
  gDesktop:[["desktop.subtitle_font_size","num"],["desktop.opacity","num"],
            ["desktop.subtitle_width","num"],["web.port","num"]],
};
function deviceSelect(type,v){
  const sel=document.createElement('select');
  const list=type==='din'?DEV.inputs:DEV.outputs;
  const od=document.createElement('option');od.value='';od.textContent=t('default_device');sel.appendChild(od);
  let matched=(v==null||v==='');
  list.forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n;
    if(!matched&&v&&n.toLowerCase().includes(String(v).toLowerCase())){o.selected=true;matched=true;}
    sel.appendChild(o);});
  if(!matched&&v){const o=document.createElement('option');o.value=v;o.textContent=v+' (?)';o.selected=true;sel.appendChild(o);}
  return sel;
}
function appModeSelect(v){
  const sel=document.createElement('select');
  ['vrchat','discord'].forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;
    if(v===c)o.selected=true;sel.appendChild(o);});
  return sel;
}
function buildFields(){
  for(const [gid,fields] of Object.entries(GROUPS)){
    const g=document.getElementById(gid);g.innerHTML='';
    fields.forEach(([path,type])=>{
      const f=document.createElement('div');f.className='fld';
      const s=document.createElement('span');s.textContent=t('f.'+path);f.appendChild(s);
      let i;const v=getP(CFG,path);
      if(type==='bool'){i=document.createElement('input');i.type='checkbox';i.checked=!!v;}
      else if(type==='appmode'){i=appModeSelect(v);}
      else if(type==='din'||type==='dout'){i=deviceSelect(type,v);}
      else{i=document.createElement('input');i.type=type==='pass'?'password':(type==='num'?'number':'text');
        if(type==='num')i.step='any';i.value=v==null?'':v;}
      i.dataset.path=path;i.dataset.type=type;f.appendChild(i);g.appendChild(f);
    });
  }
}
async function saveCfg(){
  document.querySelectorAll('[data-path]').forEach(i=>{
    const ty=i.dataset.type;let v;
    if(ty==='bool')v=i.checked;else if(ty==='num')v=parseFloat(i.value);else v=i.value;
    if(ty==='num'&&isNaN(v))return;setP(CFG,i.dataset.path,v);
  });
  const r=await api('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(CFG)});
  document.getElementById('cfgNote').textContent=r.note||'saved';
}

function connectWS(){
  const ws=new WebSocket(`ws://${location.host}/ws`);
  ws.onmessage=e=>{const m=JSON.parse(e.data);applyState(m.state);applySubs(m.subs,m.partial);};
  ws.onclose=()=>setTimeout(connectWS,1000);
}
(async function(){
  I18N=await api('/api/i18n');UILANG=I18N.lang||"en";fillUiLangSelect();
  META=await api('/api/meta');fillLangs();
  DEV=await api('/api/devices');
  CFG=await api('/api/config');
  applyI18n();              // builds fields + chips, applies static labels
  applyState(await api('/api/state'));
  connectWS();
})();
</script>
</body>
</html>
